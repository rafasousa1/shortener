name: Short Pipe

on:
  push:
    branches:
      - main

jobs:
  verify_code:
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses: actions/checkout@v5
    
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
        working-directory: src